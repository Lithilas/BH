<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lithilas Bounty Hunter</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        :root { --red: #ff4d4d; --blue: #4d94ff; --dark: #0a0a0a; --gold: #ffd700; --green: #28a745; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: white; margin: 0; padding: 15px; overflow-x: hidden; }
        .container { max-width: 500px; margin: auto; }
        .hidden { display: none !important; }
        
        #drop-zone { 
            border: 3px dashed #444; padding: 40px; text-align: center; border-radius: 12px; 
            background: #151515; cursor: pointer; margin: 15px 0; transition: 0.3s;
        }
        #drop-zone.dragover { border-color: var(--gold); background: #222; }
        .player-card { 
            background: #1a1a1a; margin: 10px 0; padding: 12px; border-radius: 8px; 
            display: flex; align-items: center; gap: 12px; border-left: 6px solid #444;
        }
        .player-card img { width: 60px; height: 60px; border-radius: 4px; object-fit: cover; background: #000; flex-shrink: 0; }
        
        .action-btn { background: var(--gold); color: black; padding: 18px; border: none; font-weight: bold; width: 100%; cursor: pointer; border-radius: 8px; font-size: 1.1rem; margin-top: 10px; transition: 0.3s; }
        .action-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .team-btn { padding: 12px; border: none; color: white; opacity: 0.2; cursor: pointer; font-weight: bold; flex: 1; border-radius: 4px; }
        .team-btn.active { opacity: 1; outline: 2px solid white; transform: scale(1.05); }
        
        #timer { font-size: 4rem; text-align: center; color: var(--gold); font-family: monospace; font-weight: bold; margin: 15px 0; }
        .target-frame { border: 4px solid var(--gold); padding: 15px; text-align: center; background: #000; border-radius: 12px; }
        .target-img { width: 160px; height: 160px; object-fit: cover; border: 2px solid #333; border-radius: 12px; margin: 0 auto; display: block; }
        
        input[type="number"], input[type="tel"], input[type="text"] { font-size: 1.1rem; padding: 15px; background: #222; color: white; border: 1px solid #444; border-radius: 8px; box-sizing: border-box; }
        #keyInput, #killerCodeInput { font-size: 2.5rem; width: 150px; text-align: center; background: #111; color: #0f0; border: 2px solid #0f0; margin: 15px 0; }

        #gm-player-list { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 15px; }
        .gm-card { background: #1a1a1a; padding: 8px; border-radius: 6px; display: flex; flex-direction: column; gap: 8px; border-left: 4px solid #444; font-size: 0.85rem; }
        .gm-card img { width: 40px; height: 40px; border-radius: 4px; object-fit: cover; }
        .gm-actions { display: flex; gap: 5px; }
        .gm-btn { flex: 1; border: none; padding: 6px; border-radius: 4px; cursor: pointer; font-size: 0.7rem; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div id="screen-enlist">
        <h2 style="color:var(--gold)">PRIDĖTI ŽAIDĖJUS</h2>
        <input type="text" id="nameInput" placeholder="ĮRAŠYTI NICK'Ą" style="width: 100%;">
        <div id="drop-zone"><b>Įtempti foto</b><br><small>ARBA PASIRINKTI NAUJĄ FOTO</small></div>
        <input type="file" id="fileInput" class="hidden" accept="image/*">
        <div id="playerList"></div>
        <button class="action-btn" onclick="navToAssign()">PRISKIRTI KOMANDAI</button>
    </div>

    <div id="screen-assign" class="hidden">
        <h2>KONFIGŪRACIJA</h2>
        <div style="background: #1a1a1a; padding: 15px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #333;">
            <label style="color: var(--gold); display: block; margin-bottom: 5px; font-weight: bold;">ŽAIDIMO TRUKMĖ (MINUTĖS):</label>
            <input type="number" id="gameDurationInput" value="60" min="1" style="width: 100%; text-align: center; color: var(--gold);">
        </div>
        <div id="assignList"></div>
        <button class="action-btn" style="background:var(--green)" onclick="startFullGame()">PRADĖTI ŽAIDIMĄ</button>
    </div>

    <div id="screen-wait" class="hidden">
        <h2 style="text-align: center; margin-top: 100px;">LAUKIAME STARTO</h2>
    </div>

    <div id="screen-game" class="hidden">
        <div id="timer">60:00</div>
        <div id="player-score"></div>
        <div id="hunt-ui" class="target-frame"></div>

        <div id="gm-dashboard" class="hidden">
            <h2 style="color:var(--gold); text-align:center;">GYVŲ ŽAIDĖJŲ SĄRAŠAS</h2>
            <div id="gm-score"></div>
            <div id="gm-player-list"></div>
            <button class="action-btn" style="background:var(--blue); color:white; margin-top:30px;" onclick="newRound()">NAUJAS RAUNDAS</button>
            <button class="action-btn" style="background:var(--red); color:white;" onclick="resetGame()">VISKĄ IŠTRINTI</button>
        </div>
    </div>
</div>

<div id="killer-modal" class="hidden" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); display:flex; align-items:center; justify-content:center; z-index:9999;">
    <div style="background:#151515; padding:25px; border-radius:12px; border:2px solid var(--gold); text-align:center; width:90%; max-width:400px;">
        <h3 style="color:var(--gold);">TAIKINYS NUKAUTAS!</h3>
        <p>Įveskite SAVO žaidėjo kodą:</p>
        <input type="tel" id="killerCodeInput" placeholder="TAVO KODAS">
        <div style="display:flex; gap:10px;">
            <button class="action-btn" style="background:#555; color:white;" onclick="closeKillerModal()">ATŠAUKTI</button>
            <button class="action-btn" style="background:var(--green); color:white;" onclick="confirmKillerCode()">GERAI</button>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyB1aSPG4BKYghWw2KKq_Ri4oqRbDeh4t_8",
        authDomain: "lithilas-bh.firebaseapp.com",
        databaseURL: "https://lithilas-bh-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "lithilas-bh",
        storageBucket: "lithilas-bh.firebasestorage.app",
        messagingSenderId: "971183564853",
        appId: "1:971183564853:web:2772ee6826ba1fa54d297c"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let players = []; 
    let myRole = new URLSearchParams(window.location.search).get('role') || 'GM';
    let timerInterval;

    // --- Įkėlimo logika ---
    const dz = document.getElementById('drop-zone');
    const fi = document.getElementById('fileInput');
    if(dz) dz.onclick = () => fi.click();
    if(fi) fi.onchange = (e) => { if (e.target.files.length) processFile(e.target.files[0]); };

    function processFile(file) {
        const nameVal = document.getElementById('nameInput').value.trim();
        if (!nameVal) return alert("Pirma įrašykite vardą!");
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = (e) => {
            const img = new Image();
            img.src = e.target.result;
            img.onload = () => {
                const canvas = document.createElement('canvas');
                const scale = 400 / img.width;
                canvas.width = 400; canvas.height = img.height * scale;
                canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                players.push({
                    name: nameVal, photo: canvas.toDataURL('image/jpeg', 0.6),
                    id: Math.floor(Math.random()*90+10), key: Math.floor(Math.random()*90+10),
                    team: '', isAlive: true, kills: 0
                });
                document.getElementById('nameInput').value = '';
                renderEnlist();
            };
        };
    }

    function renderEnlist() {
        document.getElementById('playerList').innerHTML = players.map(p => `<div class="player-card"><img src="${p.photo}"><b>${p.name}</b></div>`).join('');
    }

    function navToAssign() {
        if (!players.length) return alert("Pridėkite žaidėjų!");
        document.getElementById('screen-enlist').classList.add('hidden');
        document.getElementById('screen-assign').classList.remove('hidden');
        renderAssign();
    }

    function renderAssign() {
        document.getElementById('assignList').innerHTML = players.map((p, i) => `
            <div class="player-card" style="border-left-color:${p.team==='RAUDONA'?'var(--red)':p.team==='MELYNA'?'var(--blue)':'#444'}">
                <img src="${p.photo}"><b style="flex:1">${p.name}</b>
                <button class="team-btn ${p.team==='RAUDONA'?'active':''}" style="background:var(--red)" onclick="setTeam(${i},'RAUDONA')">RED</button>
                <button class="team-btn ${p.team==='MELYNA'?'active':''}" style="background:var(--blue)" onclick="setTeam(${i},'MELYNA')">BLUE</button>
            </div>
        `).join('');
    }

    window.setTeam = (idx, t) => { players[idx].team = t; renderAssign(); };

    // --- Žaidimo Startas ---
    function startFullGame() {
        if (players.some(p => !p.team)) return alert("Priskirkite visus komandoms!");
        const mins = parseInt(document.getElementById('gameDurationInput').value) || 60;
        
        db.ref('players').set(players);
        db.ref('gameStatus').set({ started: true, startTime: Date.now(), duration: mins * 60 });
    }

    db.ref('gameStatus').on('value', snap => {
        const status = snap.val();
        document.querySelectorAll('.container > div').forEach(d => d.classList.add('hidden'));
        if (status?.started) {
            document.getElementById('screen-game').classList.remove('hidden');
            if (myRole === 'GM') {
                document.getElementById('gm-dashboard').classList.remove('hidden');
            } else {
                document.getElementById('hunt-ui').classList.remove('hidden');
            }
            startTimer(status.startTime, status.duration);
        } else {
            clearInterval(timerInterval);
            document.getElementById(myRole === 'GM' ? 'screen-enlist' : 'screen-wait').classList.remove('hidden');
        }
    });

    db.ref('players').on('value', snap => {
        players = snap.exists() ? Object.values(snap.val()) : [];
        myRole === 'GM' ? renderGMDashboard() : (updateTarget(), renderPlayerScore());
    });

    function startTimer(start, dur) {
        clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            const rem = dur - Math.floor((Date.now() - start) / 1000);
            if (rem <= 0) { clearInterval(timerInterval); return document.getElementById('timer').innerText = "00:00"; }
            const m = Math.floor(rem/60), s = rem%60;
            document.getElementById('timer').innerText = `${m}:${s < 10 ? '0'+s : s}`;
        }, 1000);
    }

    // --- Žaidėjų funkcijos ---
    function updateTarget() {
        const target = players.find(p => p.team !== myRole && p.isAlive);
        const ui = document.getElementById('hunt-ui');
        if (!target) return ui.innerHTML = "<h1 style='color:var(--green)'>MISIJA ĮVYKDYTA</h1>";
        
        ui.innerHTML = `
            <img class="target-img" src="${target.photo}">
            <h1>${target.name}</h1>
            <h2 style="color:var(--gold)">ID: ${target.id}</h2>
            <input type="tel" id="keyInput" placeholder="--">
            <button id="killBtn" onclick="checkKill()" class="action-btn" style="background:#a00; color:white;">PATVIRTINTI</button>
        `;
        window.activeKey = target.key;
        window.activeTargetId = target.id;
    }

    window.checkKill = () => {
        const val = parseInt(document.getElementById('keyInput').value);
        if (val === window.activeKey) {
            document.getElementById('killer-modal').classList.remove('hidden');
        } else {
            alert("Neteisingas kodas!");
        }
    };

    window.confirmKillerCode = () => {
        const code = parseInt(document.getElementById('killerCodeInput').value);
        const hunter = players.find(p => p.team === myRole && p.isAlive && p.key === code);
        if (hunter) {
            db.ref('players').once('value', snap => {
                snap.forEach(c => {
                    if(c.val().id === window.activeTargetId) c.ref.update({ isAlive: false });
                    if(c.val().id === hunter.id) c.ref.update({ kills: (c.val().kills || 0) + 1 });
                });
            });
            closeKillerModal();
        } else alert("Klaidingas tavo kodas!");
    };

    window.closeKillerModal = () => document.getElementById('killer-modal').classList.add('hidden');

    function renderPlayerScore() {
        const r = players.filter(p => p.team === 'RAUDONA' && p.isAlive).length;
        const b = players.filter(p => p.team === 'MELYNA' && p.isAlive).length;
        document.getElementById('player-score').innerHTML = `<div style="display:flex; justify-content:space-between; padding:10px;"><span>RAUDONI: ${r}</span><span>MĖLYNI: ${b}</span></div>`;
    }

    function renderGMDashboard() {
        document.getElementById('gm-player-list').innerHTML = players.map((p, i) => `
            <div class="gm-card" style="border-left-color:${p.team==='RAUDONA'?'var(--red)':'var(--blue)'}">
                <img src="${p.photo}">
                <b>${p.name} ${p.isAlive ? '✅' : '💀'}</b>
                ID: ${p.id} | KODAS: ${p.key}<br>TAŠKAI: ${p.kills || 0}
            </div>
        `).join('');
    }

    window.resetGame = () => { if(confirm("Trinti viską?")) { db.ref().remove(); location.reload(); }};
    window.newRound = () => {
        const mins = parseInt(document.getElementById('gameDurationInput').value) || 60;
        players.forEach(p => { p.isAlive = true; p.id = Math.floor(Math.random()*90+10); p.key = Math.floor(Math.random()*90+10); });
        db.ref('players').set(players);
        db.ref('gameStatus').update({ startTime: Date.now(), duration: mins * 60 });
    };

</script>
</body>
</html>
