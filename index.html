<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Airsoft Bounty Hunter</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        :root { --red: #ff4d4d; --blue: #4d94ff; --dark: #0a0a0a; --gold: #ffd700; --green: #28a745; }
        body { font-family: sans-serif; background: var(--dark); color: white; margin: 0; padding: 15px; overflow-x: hidden; }
        .container { max-width: 500px; margin: auto; }
        .hidden { display: none !important; }
        
        /* Setup Phase */
        #drop-zone { border: 3px dashed #444; padding: 30px; text-align: center; border-radius: 10px; background: #151515; cursor: pointer; margin-top: 10px; }
        .player-card { background: #1a1a1a; margin: 10px 0; padding: 12px; border-radius: 8px; display: flex; align-items: center; gap: 12px; border-left: 6px solid #444; }
        .player-card img { width: 60px; height: 60px; border-radius: 4px; object-fit: cover; }
        .player-info { flex: 1; }
        .codes { font-family: monospace; color: var(--gold); font-size: 0.85rem; margin-top: 4px; }

        /* Buttons */
        .action-btn { background: var(--gold); color: black; padding: 18px; border: none; font-weight: bold; width: 100%; cursor: pointer; margin-top: 10px; border-radius: 8px; font-size: 1.1rem; }
        .team-btn { padding: 12px 18px; border: none; color: white; opacity: 0.2; cursor: pointer; font-weight: bold; border-radius: 4px; font-size: 0.9rem; }
        .team-btn.active { opacity: 1; outline: 2px solid white; transform: scale(1.05); }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: #111; }
        td { border: 1px solid #333; padding: 8px; }

        /* Game Phase */
        #timer { font-size: 4rem; text-align: center; color: var(--gold); font-family: monospace; font-weight: bold; margin: 15px 0; }
        .target-frame { border: 4px solid var(--gold); padding: 15px; text-align: center; background: #000; }
        .target-img-large { width: 100%; height: 280px; object-fit: cover; border: 1px solid #333; }
        .key-input { font-size: 2.5rem; width: 110px; text-align: center; background: #111; color: #0f0; border: 2px solid #0f0; border-radius: 8px; margin: 15px 0; }
    </style>
</head>
<body>

<div class="container">
    <div id="screen-enlist">
        <h2 style="color:var(--gold)">1. ENLIST PLAYERS</h2>
        <input type="text" id="nameInput" placeholder="PLAYER NAME..." style="width: 100%; padding: 15px; box-sizing: border-box; background: #222; color: white; border: 1px solid #444; border-radius: 8px;">
        <div id="drop-zone"><strong>DRAG PHOTO HERE</strong><br><small>OR CLICK TO SELECT</small></div>
        <input type="file" id="fileInput" class="hidden" accept="image/*">
        <div id="playerList"></div>
        <button class="action-btn" onclick="goToAssign()">NEXT: ASSIGN TEAMS</button>
    </div>

    <div id="screen-assign" class="hidden">
        <h2>2. ASSIGN TEAMS</h2>
        <div id="assignList"></div>
        <button class="action-btn" style="background:var(--green)" onclick="goToReview()">FINAL REVIEW</button>
        <button class="action-btn" style="background:#333; color:white;" onclick="nav('screen-enlist')">BACK</button>
    </div>

    <div id="screen-review" class="hidden">
        <h2>3. FINAL CONFIRMATION</h2>
        <div id="reviewTableArea"></div>
        <button class="action-btn" style="background:var(--green)" onclick="startGlobalGame()">START GAME (SYNC ALL)</button>
    </div>

    <div id="screen-game" class="hidden">
        <div id="timer">60:00</div>
        <div id="hunt-ui" class="target-frame">
            <p id="team-label" style="font-weight:bold;"></p>
            <img id="targetImg" class="target-img-large">
            <h1 id="targetName" style="margin:10px 0;">--</h1>
            <h2 style="color:var(--gold); margin:0;">ID: <span id="targetID">--</span></h2>
            <input type="number" id="keyInput" class="key-input" placeholder="--">
            <button onclick="submitKill()" class="action-btn" style="background:#a00; color:white;">CONFIRM KILL</button>
        </div>
    </div>
</div>

<script>
    // --- FIREBASE CONFIG ---
    const firebaseConfig = {
        const firebaseConfig = {
  apiKey: "AIzaSyB1aSPG4BKYghWw2KKq_Ri4oqRbDeh4t_8",
  authDomain: "lithilas-bh.firebaseapp.com",
  projectId: "lithilas-bh",
  storageBucket: "lithilas-bh.firebasestorage.app",
  messagingSenderId: "971183564853",
  appId: "1:971183564853:web:2772ee6826ba1fa54d297c",
  measurementId: "G-Y6FSWJD169"
};

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let players = []; 
    let myRole = new URLSearchParams(window.location.search).get('role') || 'GM';

    // --- ENLIST LOGIC ---
    const dz = document.getElementById('drop-zone');
    const fi = document.getElementById('fileInput');
    dz.onclick = () => fi.click();
    ['dragover', 'drop'].forEach(e => dz.addEventListener(e, ev => ev.preventDefault()));
    dz.addEventListener('drop', e => handleFile(e.dataTransfer.files[0]));
    fi.onchange = e => handleFile(e.target.files[0]);

    function handleFile(file) {
        const name = document.getElementById('nameInput').value.trim();
        if (!name) return alert("Enter name first!");
        const reader = new FileReader();
        reader.onload = e => {
            players.push({
                name, photo: e.target.result,
                id: Math.floor(Math.random() * 90 + 10),
                key: Math.floor(Math.random() * 90 + 10),
                team: '', isAlive: true
            });
            document.getElementById('nameInput').value = '';
            renderEnlistList();
        };
        reader.readAsDataURL(file);
    }

    function renderEnlistList() {
        document.getElementById('playerList').innerHTML = players.map(p => `
            <div class="player-card"><img src="${p.photo}"><div class="player-info"><b>${p.name}</b><div class="codes">ID: ${p.id} | KEY: ${p.key}</div></div></div>
        `).join('');
    }

    // --- ASSIGN LOGIC ---
    function goToAssign() {
        if(players.length < 1) return alert("Add players first!");
        nav('screen-assign');
        renderAssignList();
    }

    function renderAssignList() {
        document.getElementById('assignList').innerHTML = players.map((p, i) => `
            <div class="player-card" style="border-left-color:${p.team==='RAUDONA'?'red':p.team==='MELYNA'?'blue':'#444'}">
                <img src="${p.photo}"><b style="flex:1">${p.name}</b>
                <div style="display:flex; gap:5px;">
                    <button class="team-btn ${p.team==='RAUDONA'?'active':''}" style="background:var(--red)" onclick="setTeam(${i},'RAUDONA')">RED</button>
                    <button class="team-btn ${p.team==='MELYNA'?'active':''}" style="background:var(--blue)" onclick="setTeam(${i},'MELYNA')">BLUE</button>
                </div>
            </div>
        `).join('');
    }

    function setTeam(index, team) {
        players[index].team = team;
        renderAssignList(); // Updates buttons instantly
    }

    // --- REVIEW & SYNC ---
    function goToReview() {
        if (players.some(p => !p.team)) return alert("Assign all teams!");
        nav('screen-review');
        let html = '<table>';
        players.forEach(p => {
            html += `<tr style="color:${p.team==='RAUDONA'?'#ff4d4d':'#4d94ff'}"><td>${p.name}</td><td>${p.team}</td><td>ID:${p.id}</td><td>KEY:${p.key}</td></tr>`;
        });
        document.getElementById('reviewTableArea').innerHTML = html + '</table>';
    }

    function startGlobalGame() {
        // Now push everything to Firebase at once
        db.ref('players').set(players);
        db.ref('gameStatus').set({ started: true, startTime: Date.now() });
    }

    // --- GAMEPLAY ---
    function runTimer(startTime) {
        setInterval(() => {
            const remaining = 3600 - Math.floor((Date.now() - startTime) / 1000);
            if (remaining <= 0) return document.getElementById('timer').innerText = "00:00";
            const m = Math.floor(remaining / 60);
            const s = remaining % 60;
            document.getElementById('timer').innerText = `${m}:${s < 10 ? '0'+s : s}`;
        }, 1000);
    }

    function updateTarget() {
        if (myRole === 'GM') return;
        document.getElementById('team-label').innerText = "OPERATIVE: " + myRole;
        document.getElementById('team-label').style.color = myRole === 'RAUDONA' ? 'var(--red)' : 'var(--blue)';
        
        const target = players.find(p => p.team !== myRole && p.isAlive);
        if (!target) return document.getElementById('hunt-ui').innerHTML = "<h2>MISSION COMPLETE</h2>";

        document.getElementById('targetImg').src = target.photo;
        document.getElementById('targetName').innerText = target.name;
        document.getElementById('targetID').innerText = target.id;
        window.activeKey = target.key;
    }

    function submitKill() {
        if (document.getElementById('keyInput').value == window.activeKey) {
            const target = players.find(p => p.team !== myRole && p.isAlive);
            db.ref('players').once('value', snap => {
                snap.forEach(c => { if(c.val().name === target.name) c.ref.update({ isAlive: false }); });
            });
            alert("KILL CONFIRMED");
        } else alert("INVALID KEY");
    }

    // --- REMOTE LISTENERS ---
    db.ref('gameStatus').on('value', snap => {
        const s = snap.val();
        if (s && s.started) {
            nav('screen-game');
            runTimer(s.startTime);
        }
    });

    db.ref('players').on('value', snap => {
        if (snap.exists()) {
            players = Object.values(snap.val());
            if (document.getElementById('screen-game').classList.contains('hidden') === false) updateTarget();
        }
    });

    function nav(id) {
        document.querySelectorAll('.container > div').forEach(d => d.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }
</script>
</body>
</html>
