<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Airsoft Tracker</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        :root { --red: #ff4d4d; --blue: #4d94ff; --dark: #0a0a0a; --gold: #ffd700; }
        body { font-family: sans-serif; background: var(--dark); color: white; margin: 0; padding: 15px; }
        .container { max-width: 500px; margin: auto; }
        .hidden { display: none !important; }
        
        /* UI */
        #drop-zone { border: 3px dashed #444; padding: 25px; text-align: center; background: #151515; border-radius: 10px; cursor: pointer; }
        .player-card { background: #1a1a1a; margin: 10px 0; padding: 10px; border-radius: 8px; display: flex; align-items: center; gap: 10px; border-left: 5px solid #444; }
        .player-card img { width: 50px; height: 50px; border-radius: 4px; object-fit: cover; background: #000; }
        
        /* Buttons */
        .action-btn { background: var(--gold); color: black; padding: 15px; border: none; font-weight: bold; width: 100%; cursor: pointer; border-radius: 8px; font-size: 1rem; margin-top: 10px; }
        .team-btn { padding: 10px; border: none; color: white; opacity: 0.2; cursor: pointer; font-weight: bold; flex: 1; border-radius: 4px; }
        .team-btn.active { opacity: 1; outline: 2px solid white; }
        
        /* Game UI */
        #timer { font-size: 3.5rem; text-align: center; color: var(--gold); font-family: monospace; }
        .target-frame { border: 3px solid var(--gold); padding: 15px; text-align: center; background: #000; }
        .target-img { width: 100%; height: 250px; object-fit: cover; }
        .key-input { font-size: 2rem; width: 100px; text-align: center; background: #111; color: #0f0; border: 1px solid #0f0; margin: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div id="screen-enlist">
        <h2>1. ENLIST</h2>
        <input type="text" id="nameInput" placeholder="PLAYER NAME..." style="width:100%; padding:15px; box-sizing:border-box; background:#222; color:white; border:1px solid #444;">
        <div id="drop-zone" onclick="document.getElementById('fileInput').click()">CLICK TO UPLOAD PHOTO</div>
        <input type="file" id="fileInput" class="hidden" accept="image/*">
        <div id="playerList"></div>
        <button class="action-btn" onclick="showAssign()">NEXT: ASSIGN TEAMS</button>
    </div>

    <div id="screen-assign" class="hidden">
        <h2>2. ASSIGN</h2>
        <div id="assignList"></div>
        <button class="action-btn" onclick="pushFinal()">START GAME</button>
    </div>

    <div id="screen-game" class="hidden">
        <div id="timer">60:00</div>
        <div id="hunt-ui" class="target-frame">
            <img id="targetImg" class="target-img">
            <h1 id="targetName">--</h1>
            <input type="number" id="keyInput" class="key-input">
            <button onclick="submitKill()" class="action-btn" style="background:red; color:white;">KILL CONFIRMED</button>
        </div>
    </div>
</div>

<script>
    // --- FIREBASE CONFIG (ADD YOURS) ---
    const firebaseConfig = {
  apiKey: "AIzaSyB1aSPG4BKYghWw2KKq_Ri4oqRbDeh4t_8",
  authDomain: "lithilas-bh.firebaseapp.com",
  projectId: "lithilas-bh",
  storageBucket: "lithilas-bh.firebasestorage.app",
  messagingSenderId: "971183564853",
  appId: "1:971183564853:web:2772ee6826ba1fa54d297c",
  measurementId: "G-Y6FSWJD169"
};

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let players = [];
    let myRole = new URLSearchParams(window.location.search).get('role') || 'GM';

    // 1. FILE & COMPRESSION
    document.getElementById('fileInput').onchange = function(e) {
        const name = document.getElementById('nameInput').value;
        if(!name) return alert("Enter name first");
        
        const reader = new FileReader();
        reader.readAsDataURL(e.target.files[0]);
        reader.onload = function(event) {
            const img = new Image();
            img.src = event.target.result;
            img.onload = function() {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = 400; // Small width
                canvas.height = img.height * (400 / img.width);
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                
                const compressed = canvas.toDataURL('image/jpeg', 0.5); // 50% Quality
                players.push({
                    name: name,
                    photo: compressed,
                    id: Math.floor(Math.random()*90+10),
                    key: Math.floor(Math.random()*90+10),
                    team: '', isAlive: true
                });
                document.getElementById('nameInput').value = '';
                renderEnlist();
            };
        };
    };

    function renderEnlist() {
        let html = '';
        for(let p of players) {
            html += `<div class="player-card"><img src="${p.photo}"><b>${p.name}</b></div>`;
        }
        document.getElementById('playerList').innerHTML = html;
    }

    // 2. TEAM ASSIGNMENT (THE FIX)
    function showAssign() {
        document.getElementById('screen-enlist').classList.add('hidden');
        document.getElementById('screen-assign').classList.remove('hidden');
        renderAssign();
    }

    function renderAssign() {
        let html = '';
        players.forEach((p, i) => {
            html += `
            <div class="player-card" style="border-left-color:${p.team==='RED'?'red':p.team==='BLUE'?'blue':'#444'}">
                <img src="${p.photo}"><b style="flex:1">${p.name}</b>
                <button class="team-btn ${p.team==='RED'?'active':''}" style="background:red" onclick="setTeam(${i},'RED')">RED</button>
                <button class="team-btn ${p.team==='BLUE'?'active':''}" style="background:blue" onclick="setTeam(${i},'BLUE')">BLUE</button>
            </div>`;
        });
        document.getElementById('assignList').innerHTML = html;
    }

    window.setTeam = function(i, team) {
        players[i].team = team;
        renderAssign(); // Refresh UI instantly
    };

    // 3. PUSH & SYNC
    function pushFinal() {
        db.ref('players').set(players);
        db.ref('gameStatus').set({ started: true, startTime: Date.now() });
    }

    db.ref('gameStatus').on('value', snap => {
        if(snap.val()?.started) {
            document.querySelectorAll('.container > div').forEach(d => d.classList.add('hidden'));
            document.getElementById('screen-game').classList.remove('hidden');
            setInterval(() => {
                const rem = 3600 - Math.floor((Date.now() - snap.val().startTime)/1000);
                document.getElementById('timer').innerText = Math.floor(rem/60) + ":" + (rem%60).toString().padStart(2,'0');
            }, 1000);
        }
    });

    db.ref('players').on('value', snap => {
        if(snap.exists()) {
            players = Object.values(snap.val());
            if(myRole !== 'GM') updateTarget();
        }
    });

    function updateTarget() {
        const target = players.find(p => p.team !== myRole && p.isAlive);
        if(!target) return document.getElementById('hunt-ui').innerHTML = "<h1>VICTORY</h1>";
        document.getElementById('targetImg').src = target.photo;
        document.getElementById('targetName').innerText = target.name;
        window.activeKey = target.key;
    }

    window.submitKill = function() {
        if(document.getElementById('keyInput').value == window.activeKey) {
            const target = players.find(p => p.team !== myRole && p.isAlive);
            db.ref('players').once('value', snap => {
                snap.forEach(c => { if(c.val().name === target.name) c.ref.update({ isAlive: false }); });
            });
            alert("DONE");
        } else alert("WRONG");
    };
</script>
</body>
</html>
