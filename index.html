<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Airsoft Control</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        :root { --red: #ff4d4d; --blue: #4d94ff; --dark: #0a0a0a; --gold: #ffd700; --green: #28a745; }
        body { font-family: sans-serif; background: var(--dark); color: white; margin: 0; padding: 15px; }
        .container { max-width: 500px; margin: auto; }
        .hidden { display: none !important; }
        
        /* UI Elements */
        #drop-zone { border: 3px dashed #444; padding: 30px; text-align: center; border-radius: 10px; background: #151515; margin-top: 10px; cursor: pointer; }
        .player-card { background: #1a1a1a; margin: 10px 0; padding: 12px; border-radius: 8px; display: flex; align-items: center; gap: 12px; border-left: 6px solid #444; }
        .player-card img { width: 60px; height: 60px; border-radius: 4px; object-fit: cover; }
        
        /* Buttons */
        .action-btn { background: var(--gold); color: black; padding: 18px; border: none; font-weight: bold; width: 100%; cursor: pointer; margin-top: 10px; border-radius: 8px; font-size: 1.1rem; }
        .team-btn { padding: 12px; border: none; color: white; opacity: 0.25; cursor: pointer; font-weight: bold; border-radius: 4px; flex: 1; }
        .team-btn.active { opacity: 1; outline: 2px solid white; }
        
        /* Game Screen */
        #timer { font-size: 4rem; text-align: center; color: var(--gold); font-family: monospace; font-weight: bold; margin: 15px 0; }
        .target-frame { border: 4px solid var(--gold); padding: 15px; text-align: center; background: #000; }
        .target-img-large { width: 100%; height: 280px; object-fit: cover; }
        .key-input { font-size: 2.5rem; width: 110px; text-align: center; background: #111; color: #0f0; border: 2px solid #0f0; margin: 15px 0; }
    </style>
</head>
<body>

<div class="container">
    <div id="screen-enlist">
        <h2 style="color:var(--gold)">1. ENLIST</h2>
        <input type="text" id="nameInput" placeholder="PLAYER NAME..." style="width: 100%; padding: 15px; box-sizing: border-box; background: #222; color: white; border: 1px solid #444;">
        <div id="drop-zone" onclick="document.getElementById('fileInput').click()"><strong>DROP PHOTO HERE</strong></div>
        <input type="file" id="fileInput" class="hidden" accept="image/*">
        <div id="playerList"></div>
        <button class="action-btn" onclick="showAssign()">NEXT: ASSIGN TEAMS</button>
    </div>

    <div id="screen-assign" class="hidden">
        <h2>2. ASSIGN TEAMS</h2>
        <div id="assignList"></div>
        <button class="action-btn" style="background:var(--green)" onclick="showReview()">FINAL REVIEW</button>
    </div>

    <div id="screen-review" class="hidden">
        <h2>3. REVIEW</h2>
        <div id="reviewTableArea"></div>
        <button class="action-btn" style="background:var(--green)" onclick="pushDataToFirebase()">START GAME (SYNC ALL)</button>
    </div>

    <div id="screen-wait" class="hidden">
        <h2 style="text-align: center; margin-top: 100px;">WAITING FOR GM...</h2>
    </div>

    <div id="screen-game" class="hidden">
        <div id="timer">60:00</div>
        <div id="hunt-ui" class="target-frame">
            <img id="targetImg" class="target-img-large">
            <h1 id="targetName">--</h1>
            <h2 style="color:var(--gold)">ID: <span id="targetID">--</span></h2>
            <input type="number" id="keyInput" class="key-input" placeholder="--">
            <button onclick="submitKill()" class="action-btn" style="background:#a00; color:white;">KILL CONFIRMED</button>
        </div>
    </div>
</div>

<script>
    // --- FIREBASE CONFIG (Required) ---
    const firebaseConfig = {
    const firebaseConfig = {
  apiKey: "AIzaSyB1aSPG4BKYghWw2KKq_Ri4oqRbDeh4t_8",
  authDomain: "lithilas-bh.firebaseapp.com",
  projectId: "lithilas-bh",
  storageBucket: "lithilas-bh.firebasestorage.app",
  messagingSenderId: "971183564853",
  appId: "1:971183564853:web:2772ee6826ba1fa54d297c",
  measurementId: "G-Y6FSWJD169"
};

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let localPlayers = []; // We handle everything locally FIRST to stop bugs
    let myRole = new URLSearchParams(window.location.search).get('role') || 'GM';

    // 1. NAVIGATION
    function nav(id) {
        document.querySelectorAll('.container > div').forEach(d => d.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }

    if (myRole !== 'GM') nav('screen-wait');

    // 2. FILE HANDLING
    document.getElementById('fileInput').onchange = (e) => handleFile(e.target.files[0]);
    function handleFile(file) {
        const name = document.getElementById('nameInput').value.trim();
        if (!name) return alert("Enter name first!");
        const reader = new FileReader();
        reader.onload = (e) => {
            localPlayers.push({
                name, photo: e.target.result,
                id: Math.floor(Math.random() * 90 + 10),
                key: Math.floor(Math.random() * 90 + 10),
                team: '', isAlive: true
            });
            document.getElementById('nameInput').value = '';
            renderEnlist();
        };
        reader.readAsDataURL(file);
    }

    function renderEnlist() {
        document.getElementById('playerList').innerHTML = localPlayers.map(p => `
            <div class="player-card"><img src="${p.photo}"><b>${p.name}</b></div>
        `).join('');
    }

    // 3. TEAM ASSIGNMENT (THE BUG FIX)
    function showAssign() {
        if(localPlayers.length === 0) return alert("Add players!");
        nav('screen-assign');
        renderAssign();
    }

    function renderAssign() {
        document.getElementById('assignList').innerHTML = localPlayers.map((p, i) => `
            <div class="player-card" style="border-left-color:${p.team==='RAUDONA'?'red':p.team==='MELYNA'?'blue':'#444'}">
                <img src="${p.photo}"><b style="flex:1">${p.name}</b>
                <button class="team-btn ${p.team==='RAUDONA'?'active':''}" style="background:var(--red)" onclick="setTeam(${i},'RAUDONA')">RED</button>
                <button class="team-btn ${p.team==='MELYNA'?'active':''}" style="background:var(--blue)" onclick="setTeam(${i},'MELYNA')">BLUE</button>
            </div>
        `).join('');
    }

    function setTeam(idx, teamName) {
        localPlayers[idx].team = teamName;
        renderAssign(); // This updates the UI INSTANTLY without Firebase lag
    }

    // 4. REVIEW & PUSH
    function showReview() {
        nav('screen-review');
        let html = '<table border="1" style="width:100%; border-collapse:collapse;">';
        localPlayers.forEach(p => {
            html += `<tr><td>${p.name}</td><td>${p.team}</td><td>ID:${p.id}</td><td>KEY:${p.key}</td></tr>`;
        });
        document.getElementById('reviewTableArea').innerHTML = html + '</table>';
    }

    function pushDataToFirebase() {
        // This is the ONE time we push the whole list
        db.ref('players').set(localPlayers);
        db.ref('gameStatus').set({ started: true, startTime: Date.now() });
    }

    // 5. GAMEPLAY SYNC
    db.ref('gameStatus').on('value', snap => {
        const s = snap.val();
        if (s && s.started) {
            nav('screen-game');
            startTimer(s.startTime);
        }
    });

    db.ref('players').on('value', snap => {
        if (snap.exists()) {
            localPlayers = Object.values(snap.val());
            updateTarget();
        }
    });

    function startTimer(start) {
        setInterval(() => {
            const rem = 3600 - Math.floor((Date.now() - start) / 1000);
            const m = Math.floor(rem / 60), s = rem % 60;
            document.getElementById('timer').innerText = `${m}:${s < 10 ? '0'+s : s}`;
        }, 1000);
    }

    function updateTarget() {
        if (myRole === 'GM') return;
        const target = localPlayers.find(p => p.team !== myRole && p.isAlive);
        if (!target) {
            document.getElementById('hunt-ui').innerHTML = "<h1>VICTORY</h1>";
            return;
        }
        document.getElementById('targetImg').src = target.photo;
        document.getElementById('targetName').innerText = target.name;
        document.getElementById('targetID').innerText = target.id;
        window.activeKey = target.key;
    }

    function submitKill() {
        if (document.getElementById('keyInput').value == window.activeKey) {
            const target = localPlayers.find(p => p.team !== myRole && p.isAlive);
            db.ref('players').once('value', snap => {
                snap.forEach(c => { if(c.val().name === target.name) c.ref.update({ isAlive: false }); });
            });
            alert("CONFIRMED");
        } else alert("WRONG KEY");
    }
</script>
</body>
</html>
