<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lithilas Bounty Hunter zaidimas</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        :root { --red: #ff4d4d; --blue: #4d94ff; --dark: #0a0a0a; --gold: #ffd700; --green: #28a745; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: white; margin: 0; padding: 15px; overflow-x: hidden; }
        .container { max-width: 500px; margin: auto; }
        .hidden { display: none !important; }
        
        /* Step 1: Enlist */
        #drop-zone { 
            border: 3px dashed #444; padding: 40px; text-align: center; border-radius: 12px; 
            background: #151515; cursor: pointer; margin: 15px 0; transition: 0.3s;
        }
        #drop-zone.dragover { border-color: var(--gold); background: #222; }
        .player-card { 
            background: #1a1a1a; margin: 10px 0; padding: 12px; border-radius: 8px; 
            display: flex; align-items: center; gap: 12px; border-left: 6px solid #444;
        }
        .player-card img { width: 60px; height: 60px; border-radius: 4px; object-fit: cover; background: #000; flex-shrink: 0; }
        
        /* Buttons */
        .action-btn { background: var(--gold); color: black; padding: 18px; border: none; font-weight: bold; width: 100%; cursor: pointer; border-radius: 8px; font-size: 1.1rem; margin-top: 10px; transition: 0.3s; }
        .action-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .team-btn { padding: 12px; border: none; color: white; opacity: 0.2; cursor: pointer; font-weight: bold; flex: 1; border-radius: 4px; }
        .team-btn.active { opacity: 1; outline: 2px solid white; transform: scale(1.05); }
        
        /* Game UI */
        #timer { font-size: 4rem; text-align: center; color: var(--gold); font-family: monospace; font-weight: bold; margin: 15px 0; }
        .target-frame { border: 4px solid var(--gold); padding: 15px; text-align: center; background: #000; border-radius: 12px; }
        .target-img { width: 160px; height: 160px; object-fit: cover; border: 2px solid #333; border-radius: 12px; margin: 0 auto; display: block; }
        
        /* GM Dashboard Compact View */
        #gm-player-list { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 15px; }
        .gm-card { 
            background: #1a1a1a; padding: 8px; border-radius: 6px; 
            display: flex; flex-direction: column; gap: 8px; border-left: 4px solid #444;
            font-size: 0.85rem; overflow: hidden;
        }
        .gm-card-top { display: flex; align-items: center; gap: 8px; }
        .gm-card img { width: 40px; height: 40px; border-radius: 4px; object-fit: cover; flex-shrink: 0; }
        .gm-card-info { display: flex; flex-direction: column; overflow: hidden; flex: 1; }
        .gm-card-info b { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-size: 0.9rem; }
        .gm-status { font-size: 0.75rem; color: #aaa; margin-top: 2px; line-height: 1.3; }
        .gm-actions { display: flex; gap: 5px; width: 100%; }
        .gm-btn { flex: 1; border: none; padding: 6px; border-radius: 4px; cursor: pointer; font-size: 0.7rem; font-weight: bold; }
        
        /* NFC Scan Anim */
        .scanning { animation: pulse 1.5s infinite; background-color: #333 !important; color: var(--gold) !important; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>
<div class="container">
    <div id="screen-enlist">
        <h2 style="color:var(--gold)">PRIDĖTI ŽAIDĖJUS</h2>
        <input type="text" id="nameInput" placeholder="ĮRAŠYTI NICK'Ą" style="width: 100%; padding: 15px; box-sizing: border-box; background: #222; color: white; border: 1px solid #444; border-radius: 8px; font-size: 1.1rem; margin-bottom: 15px;">
        
        <div id="drop-zone">
            <b style="font-size: 1.2rem;">Įtempti foto</b><br>
            <small>ARBA PASIRINKTI NAUJĄ FOTO</small>
        </div>
        <input type="file" id="fileInput" class="hidden" accept="image/*">
        
        <div id="playerList"></div>
        <button class="action-btn" onclick="navToAssign()">PRISKIRTI KOMANDAI</button>
    </div>

    <div id="screen-assign" class="hidden">
        <h2>PRISKIRTI KOMANDAI</h2>
        <div id="assignList"></div>
        <button class="action-btn" style="background:var(--green)" onclick="startNFCSetup()">PEREITI PRIE NFC SUSIEJIMO</button>
    </div>

    <div id="screen-nfc-setup" class="hidden">
        <h2 style="color:var(--gold); text-align:center;">NFC ŽYMIŲ SUSIEJIMAS</h2>
        <div id="nfc-setup-content" class="target-frame" style="margin-top:20px;">
            </div>
    </div>

    <div id="screen-wait" class="hidden">
        <h2 style="text-align: center; margin-top: 100px;">LAUKIAME STARTO</h2>
    </div>

    <div id="screen-game" class="hidden">
        <div id="timer">105:00</div>
        
        <div id="player-score" style="margin-bottom: 15px;"></div>

        <div id="hunt-ui" class="target-frame">
            </div>

        <div id="gm-dashboard" class="hidden">
            <h2 style="color:var(--gold); text-align:center; margin-bottom:5px;">GYVŲ ŽAIDĖJŲ SĄRAŠAS</h2>
            <div id="gm-score"></div>
            <div id="gm-player-list"></div>
            
            <button id="btnStartTimer" class="action-btn" style="background:var(--gold); color:black; margin-top:30px;" onclick="startGlobalTimer()">PRADĖTI LAIKĄ</button>
            <button class="action-btn" style="background:var(--green); color:white; margin-top:10px;" onclick="openAddPlayerModal()">PRIDĖTI NAUJĄ ŽAIDĖJĄ</button>
            <button class="action-btn" style="background:var(--blue); color:white; margin-top:10px;" onclick="newRound()">NAUJAS RAUNDAS</button>
            <button class="action-btn" style="background:var(--red); color:white; margin-top:10px;" onclick="resetGame()">VISKĄ IŠTRINTI</button>
        </div>
    </div>
</div>

<div id="killer-modal" class="hidden" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); display:flex; align-items:center; justify-content:center; z-index:9999;">
    <div style="background:#151515; padding:25px; border-radius:12px; border:2px solid var(--gold); text-align:center; width:90%; max-width:400px; box-sizing:border-box;">
        <h3 style="color:var(--gold); margin-top:0;">TAIKINYS NUKAUTAS!</h3>
        <p style="font-size:1rem; margin-bottom:15px;">Nuskenuokite SAVO (žudiko) NFC tag'ą, kad gautumėte tašką:</p>
        
        <button id="btnScanKiller" class="action-btn" style="background:var(--green); color:white; margin-bottom:20px;" onclick="scanKillerNFC()">NUSKENUOTI SAVO NFC</button>
        
        <div style="display:flex; gap:10px;">
            <button class="action-btn" style="background:#555; color:white; margin:0;" onclick="closeKillerModal()">ATŠAUKTI</button>
        </div>
    </div>
</div>

<div id="add-player-modal" class="hidden" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); display:flex; align-items:center; justify-content:center; z-index:9999;">
    <div style="background:#151515; padding:25px; border-radius:12px; border:2px solid var(--gold); text-align:center; width:90%; max-width:400px; box-sizing:border-box;">
        <h3 style="color:var(--gold); margin-top:0;">PRIDĖTI NAUJĄ ŽAIDĖJĄ</h3>
        <input type="text" id="newPlayerName" placeholder="ĮRAŠYTI NICK'Ą" style="width: 100%; padding: 15px; box-sizing: border-box; background: #222; color: white; border: 1px solid #444; border-radius: 8px; font-size: 1.1rem; margin-bottom: 15px;">
        <input type="file" id="newPlayerFile" accept="image/*" style="width: 100%; margin-bottom: 15px; color: white; font-size: 1rem;">
        <div style="display:flex; gap:5px; margin-bottom: 20px;">
            <button id="btnTeamRed" class="team-btn" style="background:var(--red)" onclick="selectNewPlayerTeam('RAUDONA')">RED</button>
            <button id="btnTeamBlue" class="team-btn" style="background:var(--blue)" onclick="selectNewPlayerTeam('MELYNA')">BLUE</button>
        </div>
        <div style="display:flex; gap:10px;">
            <button class="action-btn" style="background:#555; color:white; margin:0;" onclick="closeAddPlayerModal()">ATŠAUKTI</button>
            <button class="action-btn" style="background:var(--green); color:white; margin:0;" onclick="confirmAddPlayer()">PRIDĖTI</button>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyB1aSPG4BKYghWw2KKq_Ri4oqRbDeh4t_8",
        authDomain: "lithilas-bh.firebaseapp.com",
        databaseURL: "https://lithilas-bh-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "lithilas-bh",
        storageBucket: "lithilas-bh.firebasestorage.app",
        messagingSenderId: "971183564853",
        appId: "1:971183564853:web:2772ee6826ba1fa54d297c",
        measurementId: "G-Y6FSWJD169"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let players = []; 
    let myRole = new URLSearchParams(window.location.search).get('role') || 'GM';
    let timerInterval;
    let newPlayerSelectedTeam = '';
    
    // NAUJA GLOBALDI NFC ARCHITEKTŪRA
    let ndefInstance = null;
    let nfcCallback = null;

    window.onload = () => {
        if (myRole !== 'GM') {
            document.getElementById('screen-enlist').classList.add('hidden');
            document.getElementById('screen-wait').classList.remove('hidden');
        }
    };

    const dz = document.getElementById('drop-zone');
    const fi = document.getElementById('fileInput');

    if(dz) dz.onclick = () => fi.click();
    ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(e => {
        if(dz) dz.addEventListener(e, (ev) => { ev.preventDefault(); ev.stopPropagation(); });
    });
    if(dz) dz.addEventListener('dragover', () => dz.classList.add('dragover'));
    if(dz) dz.addEventListener('dragleave', () => dz.classList.remove('dragover'));

    if(dz) dz.addEventListener('drop', (e) => {
        dz.classList.remove('dragover');
        if (e.dataTransfer.files.length) processFile(e.dataTransfer.files[0]);
    });
    if(fi) fi.onchange = (e) => { if (e.target.files.length) processFile(e.target.files[0]); };

    function processFile(file) {
        const nameVal = document.getElementById('nameInput').value.trim();
        if (!nameVal) {
            document.getElementById('fileInput').value = ''; 
            return alert("Prašome pirma įvesti vardą!");
        }

        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = (event) => {
            const img = new Image();
            img.src = event.target.result;
            img.onload = () => {
                const canvas = document.createElement('canvas');
                const MAX_WIDTH = 500;
                const scale = MAX_WIDTH / img.width;
                canvas.width = MAX_WIDTH;
                canvas.height = img.height * scale;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                
                const compressedData = canvas.toDataURL('image/jpeg', 0.6);

                players.push({
                    name: nameVal,
                    photo: compressedData,
                    nfcId: null, 
                    team: '', 
                    isAlive: true,
                    kills: 0
                });
                
                document.getElementById('nameInput').value = '';
                document.getElementById('fileInput').value = ''; 
                renderEnlist();
            };
        };
    }

    function renderEnlist() {
        document.getElementById('playerList').innerHTML = players.map(p => `
            <div class="player-card"><img src="${p.photo}"><b>${p.name}</b></div>
        `).join('');
    }

    function navToAssign() {
        if (players.length === 0) return alert("Pirma pridėkite žaidėjų!");
        document.getElementById('screen-enlist').classList.add('hidden');
        document.getElementById('screen-assign').classList.remove('hidden');
        renderAssign();
    }

    function renderAssign() {
        document.getElementById('assignList').innerHTML = players.map((p, i) => `
            <div class="player-card" style="border-left-color:${p.team==='RAUDONA'?'var(--red)':p.team==='MELYNA'?'var(--blue)':'#444'}">
                <img src="${p.photo}"><b style="flex:1">${p.name}</b>
                <div style="display:flex; gap:5px;">
                    <button class="team-btn ${p.team==='RAUDONA'?'active':''}" style="background:var(--red)" onclick="setTeam(${i},'RAUDONA')">RED</button>
                    <button class="team-btn ${p.team==='MELYNA'?'active':''}" style="background:var(--blue)" onclick="setTeam(${i},'MELYNA')">BLUE</button>
                </div>
            </div>
        `).join('');
    }

    window.setTeam = function(idx, teamName) {
        players[idx].team = teamName;
        renderAssign();
    };

    function startNFCSetup() {
        if (players.some(p => !p.team)) return alert("Priskirkite visus žaidėjus komandoms!");
        db.ref('players').set(players);
        db.ref('gameStatus').set({ nfcSetup: true, started: false }); 
    }

    // NAUJA: Stabili vieno skaitytuvo inicijavimo funkcija
    async function getNFCDevice() {
        if (!('NDEFReader' in window)) {
            alert("Jūsų naršyklė nepalaiko Web NFC! Būtina naudoti Chrome telefone Android platformoje.");
            throw new Error("NFC nepalaikomas");
        }
        if (!ndefInstance) {
            ndefInstance = new NDEFReader();
            await ndefInstance.scan();
            ndefInstance.onreading = event => {
                if (nfcCallback) {
                    const currentCallback = nfcCallback;
                    nfcCallback = null; // Išvalom iškart, kad nebūtų dubliavimo
                    currentCallback(event.serialNumber);
                }
            };
            ndefInstance.onreadingerror = () => {
                alert("Klaida nuskaitant žymę. Pridėkite dar kartą.");
            };
        }
        return ndefInstance;
    }

    // NAUJA: Funkcija, kuri saugiai užregistruoja ko laukiama iš NFC
    function listenForNFC(successCallback, errorCallback) {
        nfcCallback = successCallback;
        getNFCDevice().catch(err => {
            nfcCallback = null;
            if (errorCallback) errorCallback();
        });
    }

    function renderNFCSetup() {
        const container = document.getElementById('nfc-setup-content');
        if (!container) return;

        if (myRole === 'GM') {
            const missingNfc = players.filter(p => !p.nfcId);
            if (missingNfc.length > 0) {
                container.innerHTML = `
                    <h3 style="color:var(--gold)">LAUKIAMA, KOL KOMANDOS SUSIES NFC ŽYMES...</h3>
                    <div style="text-align:left; margin:20px auto; max-width:300px; line-height:1.8;">
                        ${players.map(p => `
                            <div style="color:${p.team==='RAUDONA'?'var(--red)':'var(--blue)'}">
                                ${p.nfcId ? '🟢' : '⚫'} <b>${p.name}</b>: ${p.nfcId ? 'SUSIETAS' : 'LAUKIA'}
                            </div>
                        `).join('')}
                    </div>
                `;
            } else {
                container.innerHTML = `
                    <h1 style="color:var(--green); font-size:2.5rem; letter-spacing:2px;">VISI PASIRUOŠĘ!</h1>
                    <p style="font-size:1rem; color:#aaa; margin-bottom:20px;">Abi komandos sėkmingai suvedė savo NFC žymes.</p>
                    <button class="action-btn" style="background:var(--gold); color:black;" onclick="startActualGame()">PRADĖTI ŽAIDIMĄ (IŠMAIŠYTI)</button>
                `;
            }
        } else if (myRole === 'RAUDONA' || myRole === 'MELYNA') {
            const pendingPlayer = players.find(p => p.team === myRole && !p.nfcId);
            if (pendingPlayer) {
                container.innerHTML = `
                    <img class="target-img" src="${pendingPlayer.photo}" style="border-color:${myRole==='RAUDONA'?'var(--red)':'var(--blue)'}">
                    <h1 style="margin:10px 0;">${pendingPlayer.name}</h1>
                    <p style="color:#aaa;">Komanda: <b style="color:${myRole==='RAUDONA'?'var(--red)':'var(--blue)'}">${myRole}</b></p>
                    <p style="font-size:0.9rem; margin-bottom: 15px;">Pridėkite savo NFC žymę ir spauskite mygtuką apačioje.</p>
                    <button id="btnScanSetup" class="action-btn" onclick="linkPlayerNFC('${pendingPlayer.name}')">NUSKAITYTI ŽYMĘ</button>
                `;
            } else {
                container.innerHTML = `
                    <h1 style="color:var(--green)">JŪSŲ KOMANDA PASIRUOŠUSI!</h1>
                    <p style="font-size:1rem; color:#aaa;">Visi jūsų komandos nariai sėkmingai susiejo NFC.</p>
                    <p style="font-size:0.9rem; color:var(--gold); margin-top:20px; animation: pulse 1.5s infinite;">Laukiama, kol GM paleis žaidimą...</p>
                `;
            }
        }
    }

    // IŠTAISYTA: Dabar susiejimas veikia stabiliai vienas po kito fone
    window.linkPlayerNFC = function(playerName) {
        const btn = document.getElementById('btnScanSetup');
        btn.innerText = "LAUKIAMA NFC... (Priglauskite)";
        btn.classList.add('scanning');
        
        listenForNFC(async (serial) => {
            btn.innerText = "NUSKAITYTI ŽYMĘ";
            btn.classList.remove('scanning');

            if (players.some(p => p.nfcId === serial)) {
                alert("Ši NFC žymė jau priskirta kitam žaidėjui! Naudokite naują.");
                return;
            }

            const pIndex = players.findIndex(p => p.name === playerName);
            players[pIndex].nfcId = serial;
            await db.ref('players').set(players);
        }, () => {
            btn.innerText = "NUSKAITYTI ŽYMĘ";
            btn.classList.remove('scanning');
        });
    };

    window.startActualGame = function() {
        for (let i = players.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [players[i], players[j]] = [players[j], players[i]];
        }
        db.ref('players').set(players);
        db.ref('gameStatus').set({ nfcSetup: false, started: true }); 
    };

    window.startGlobalTimer = function() {
        db.ref('gameStatus').update({ startTime: Date.now() });
    }

    window.newRound = function() {
        if (!confirm("Ar tikrai norite pradėti NAUJĄ RAUNDĄ? Visi žaidėjai liks tie patys, bet jų NFC žymės bus ištrintos, kad galėtumėte susieti iš naujo.")) return;
        
        players.forEach(p => { 
            p.nfcId = null; 
            p.isAlive = true;
            p.kills = 0;
        });
        
        db.ref('players').set(players);
        db.ref('gameStatus').set({ nfcSetup: true, started: false, startTime: null });
    }

    window.resetGame = function() {
        if (!confirm("Ar tikrai norite IŠTRINTI visus duomenis? Žaidėjus teks suvedinėti iš naujo.")) return;
        db.ref('players').remove();
        db.ref('gameStatus').set({ started: false, nfcSetup: false });
        players = [];
        document.getElementById('playerList').innerHTML = '';
        document.getElementById('assignList').innerHTML = '';
    }

    db.ref('gameStatus').on('value', snap => {
        const status = snap.val();
        document.querySelectorAll('.container > div').forEach(d => d.classList.add('hidden'));

        if (status && status.nfcSetup) {
            if (myRole === 'GM' || myRole === 'RAUDONA' || myRole === 'MELYNA') {
                document.getElementById('screen-nfc-setup').classList.remove('hidden');
                renderNFCSetup();
            } else {
                document.getElementById('screen-wait').classList.remove('hidden');
            }
        }
        else if (status && status.started) {
            document.getElementById('screen-game').classList.remove('hidden');
            
            if (myRole === 'GM') {
                document.getElementById('hunt-ui').classList.add('hidden');
                document.getElementById('player-score').classList.add('hidden');
                document.getElementById('gm-dashboard').classList.remove('hidden');

                if(status.startTime) {
                    if(document.getElementById('btnStartTimer')) document.getElementById('btnStartTimer').classList.add('hidden');
                } else {
                    if(document.getElementById('btnStartTimer')) document.getElementById('btnStartTimer').classList.remove('hidden');
                }
                renderGMDashboard();
            } else {
                document.getElementById('hunt-ui').classList.remove('hidden');
                document.getElementById('player-score').classList.remove('hidden');
            }
            
            if (status.startTime) {
                startTimer(status.startTime);
            } else {
                clearInterval(timerInterval);
                document.getElementById('timer').innerText = "105:00";
            }
        } else {
            clearInterval(timerInterval);
            if (myRole === 'GM') {
                document.getElementById('screen-enlist').classList.remove('hidden');
            } else {
                document.getElementById('screen-wait').classList.remove('hidden');
            }
        }
    });

    db.ref('players').on('value', snap => {
        if (snap.exists()) {
            players = Object.values(snap.val());
        } else {
            players = []; 
        }
        
        if (!document.getElementById('screen-nfc-setup').classList.contains('hidden')) {
            renderNFCSetup();
        }
        
        if (myRole !== 'GM') {
            updateTarget();
            renderPlayerScore();
        } else {
            renderGMDashboard();
        }
    });

    function startTimer(startTime) {
        clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            const rem = 6300 - Math.floor((Date.now() - startTime) / 1000); 
            if (rem <= 0) {
                clearInterval(timerInterval);
                return document.getElementById('timer').innerText = "00:00";
            }
            const m = Math.floor(rem / 60), s = rem % 60;
            document.getElementById('timer').innerText = `${m}:${s < 10 ? '0'+s : s}`;
        }, 1000);
    }

    function updateTarget() {
        if (players.length === 0) return;

        const target = players.find(p => p.team !== myRole && p.isAlive);
        if (!target) {
            document.getElementById('hunt-ui').innerHTML = "<h1 style='color:var(--green); text-align:center;'>MISIJA ĮVYKDYTA</h1>";
            window.activeTargetNFC = null;
            return;
        }
        
        if (!document.getElementById('targetImg')) {
            document.getElementById('hunt-ui').innerHTML = `
                <img id="targetImg" class="target-img" src="${target.photo}">
                <h1 id="targetName" style="margin:10px 0;">${target.name}</h1>
                <button id="killBtn" onclick="scanTargetNFC()" class="action-btn" style="background:#a00; color:white;">NUSKAITYTI TAIKINIO NFC (PATVIRTINTI)</button>
            `;
        } else {
            document.getElementById('targetImg').src = target.photo;
            document.getElementById('targetName').innerText = target.name;
        }
        
        window.activeTargetNFC = target.nfcId;
    }

    function renderPlayerScore() {
        if (myRole === 'GM') return; 

        const aliveRed = players.filter(p => p.team === 'RAUDONA' && p.isAlive).length;
        const aliveBlue = players.filter(p => p.team === 'MELYNA' && p.isAlive).length;

        document.getElementById('player-score').innerHTML = `
            <div style="display:flex; justify-content:space-between; background:#111; padding:12px; border-radius:8px; border:1px solid #333;">
                <span style="color:var(--red); font-size:1.1rem; font-weight:bold;">RAUDONI: ${aliveRed}</span>
                <span style="color:var(--blue); font-size:1.1rem; font-weight:bold;">MĖLYNI: ${aliveBlue}</span>
            </div>
        `;
    }

    window.closeKillerModal = function() {
        document.getElementById('killer-modal').classList.add('hidden');
    }

    // IŠTAISYTA: Naudoja naują stabilią NFC sistemą taikinio nukovimui
    window.scanTargetNFC = function() {
        if (!window.activeTargetNFC) return alert("TAIKINYS NERASTAS!");
        
        const killBtn = document.getElementById('killBtn');
        killBtn.innerText = "LAUKIAMA NFC... (Priglauskite)";
        killBtn.classList.add('scanning');

        listenForNFC((serial) => {
            killBtn.innerText = "NUSKAITYTI TAIKINIO NFC (PATVIRTINTI)";
            killBtn.classList.remove('scanning');
            
            if (serial === window.activeTargetNFC) {
                document.getElementById('killer-modal').classList.remove('hidden');
            } else {
                alert("KLAIDA: Nuskenuota klaidinga NFC žymė! Tai ne jūsų taikinys.");
                killBtn.disabled = true;
                
                let timeLeft = 15;
                killBtn.style.background = "#555";
                killBtn.innerText = `BLOKUOTA (${timeLeft}s)`;

                const penaltyTimer = setInterval(() => {
                    timeLeft--;
                    if (timeLeft <= 0) {
                        clearInterval(penaltyTimer);
                        killBtn.disabled = false;
                        killBtn.style.background = "#a00";
                        killBtn.innerText = "NUSKAITYTI TAIKINIO NFC (PATVIRTINTI)";
                    } else {
                        killBtn.innerText = `BLOKUOTA (${timeLeft}s)`;
                    }
                }, 1000);
            }
        }, () => {
            killBtn.innerText = "NUSKAITYTI TAIKINIO NFC (PATVIRTINTI)";
            killBtn.classList.remove('scanning');
        });
    }

    // IŠTAISYTA: Naudoja naują stabilią NFC sistemą žudiko identifikavimui
    window.scanKillerNFC = function() {
        const btn = document.getElementById('btnScanKiller');
        btn.innerText = "LAUKIAMA JŪSŲ NFC...";
        btn.classList.add('scanning');

        listenForNFC((serial) => {
            btn.innerText = "NUSKENUOTI SAVO NFC";
            btn.classList.remove('scanning');

            const validHunter = players.find(p => p.team === myRole && p.nfcId === serial);

            if (validHunter) {
                const target = players.find(p => p.team !== myRole && p.isAlive);
                if(!target) return;

                db.ref('players').once('value', snap => {
                    snap.forEach(c => { 
                        const val = c.val();
                        if(val.nfcId === target.nfcId) {
                            c.ref.update({ isAlive: false }); 
                        }
                        if(val.nfcId === validHunter.nfcId) {
                            c.ref.update({ kills: (val.kills || 0) + 1 });
                        }
                    });
                });
                
                alert("NUŽUDYMAS PATVIRTINTAS! Taškas skirtas žaidėjui: " + validHunter.name);
                closeKillerModal();
            } else {
                alert("KLAIDA: Šis NFC nepriklauso jūsų komandai arba žaidėjas nerastas!");
            }
        }, () => {
            btn.innerText = "NUSKENUOTI SAVO NFC";
            btn.classList.remove('scanning');
        });
    }

    window.openAddPlayerModal = function() {
        document.getElementById('newPlayerName').value = '';
        document.getElementById('newPlayerFile').value = '';
        newPlayerSelectedTeam = '';
        document.getElementById('btnTeamRed').classList.remove('active');
        document.getElementById('btnTeamBlue').classList.remove('active');
        document.getElementById('add-player-modal').classList.remove('hidden');
    }

    window.closeAddPlayerModal = function() {
        document.getElementById('add-player-modal').classList.add('hidden');
    }

    window.selectNewPlayerTeam = function(team) {
        newPlayerSelectedTeam = team;
        document.getElementById('btnTeamRed').classList.toggle('active', team === 'RAUDONA');
        document.getElementById('btnTeamBlue').classList.toggle('active', team === 'MELYNA');
    }

    window.confirmAddPlayer = function() {
        const name = document.getElementById('newPlayerName').value.trim();
        const fileInput = document.getElementById('newPlayerFile');
        
        if (!name) return alert("Prašome įvesti vardą!");
        if (!fileInput.files.length) return alert("Prašome pasirinkti nuotrauką!");
        if (!newPlayerSelectedTeam) return alert("Prašome pasirinkti komandą!");

        const file = fileInput.files[0];
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = (event) => {
            const img = new Image();
            img.src = event.target.result;
            img.onload = () => {
                const canvas = document.createElement('canvas');
                const MAX_WIDTH = 500;
                const scale = MAX_WIDTH / img.width;
                canvas.width = MAX_WIDTH;
                canvas.height = img.height * scale;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                
                const compressedData = canvas.toDataURL('image/jpeg', 0.6);

                players.push({
                    name: name,
                    photo: compressedData,
                    nfcId: null, 
                    team: newPlayerSelectedTeam, 
                    isAlive: true,
                    kills: 0
                });
                
                db.ref('players').set(players);
                closeAddPlayerModal();
                alert("Žaidėjas pridėtas!");
            };
        };
    }

    window.gmSwapTeam = function(index) {
        if (!players[index]) return;
        players[index].team = players[index].team === 'RAUDONA' ? 'MELYNA' : 'RAUDONA';
        db.ref('players').set(players);
    }

    window.gmDeletePlayer = function(index) {
        if (!confirm(`Ar tikrai norite pašalinti žaidėją ${players[index].name}?`)) return;
        players.splice(index, 1);
        
        if (players.length === 0) {
            db.ref('players').remove(); 
        } else {
            db.ref('players').set(players);
        }
    }

    function renderGMDashboard() {
        if (myRole !== 'GM') return;
        
        const aliveRed = players.filter(p => p.team === 'RAUDONA' && p.isAlive).length;
        const aliveBlue = players.filter(p => p.team === 'MELYNA' && p.isAlive).length;

        document.getElementById('gm-score').innerHTML = `
            <div style="display:flex; justify-content:space-between; background:#111; padding:12px; border-radius:8px; border:1px solid #333; margin-bottom: 10px;">
                <span style="color:var(--red); font-size:1.1rem; font-weight:bold;">RAUDONI: ${aliveRed}</span>
                <span style="color:var(--blue); font-size:1.1rem; font-weight:bold;">MĖLYNI: ${aliveBlue}</span>
            </div>
        `;

        document.getElementById('gm-player-list').innerHTML = players.map((p, index) => `
            <div class="gm-card" style="opacity: ${p.isAlive ? 1 : 0.4}; border-left-color:${p.team==='RAUDONA'?'var(--red)':'var(--blue)'}">
                <div class="gm-card-top">
                    <img src="${p.photo}">
                    <div class="gm-card-info">
                        <b style="text-decoration: ${p.isAlive ? 'none' : 'line-through'}">${p.name}</b>
                        <div class="gm-status">
                            ${p.isAlive ? '<span style="color:var(--green)">GYVAS</span>' : '<span style="color:var(--red)">NUKAUTAS</span>'}<br>
                            NFC: <b>${p.nfcId ? 'SUSIETAS' : 'NĖRA'}</b><br>
                            TAŠKAI: <b style="color:var(--gold)">${p.kills || 0}</b>
                        </div>
                    </div>
                </div>
                <div class="gm-actions">
                    <button class="gm-btn" style="background:#444; color:white;" onclick="gmSwapTeam(${index})">KEISTI</button>
                    <button class="gm-btn" style="background:var(--red); color:white;" onclick="gmDeletePlayer(${index})">ŠALINTI</button>
                </div>
            </div>
        `).join('');
    }
</script>
</body>
</html>
