<div id="screen-assign" class="hidden">
    <h2>PRISKIRTI KOMANDAI</h2>
    
    <div style="background: #1a1a1a; padding: 15px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #333;">
        <label style="color: var(--gold); display: block; margin-bottom: 5px; font-weight: bold;">ŽAIDIMO TRUKMĖ (MINUTĖS):</label>
        <input type="number" id="gameDurationInput" value="60" min="1" max="300" 
               style="font-size: 1.5rem; width: 100%; box-sizing: border-box; margin: 0; background: #222;">
    </div>

    <div id="assignList"></div>
    <button class="action-btn" style="background:var(--green)" onclick="startFullGame()">PRADĖTI ŽAIDIMĄ</button>
</div>

<script>
    // ... (Jūsų esama Firebase konfigūracija ir kintamieji) ...

    // PAKEISTA: startFullGame funkcija
    function startFullGame() {
        if (players.some(p => !p.team)) return alert("Priskirkite visus žaidėjus komandoms!");
        
        // Nuskaitome įvestą laiką (numatytasis 60 min, jei laukas tuščias)
        const durationMinutes = parseInt(document.getElementById('gameDurationInput').value) || 60;
        const durationSeconds = durationMinutes * 60;

        for (let i = players.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [players[i], players[j]] = [players[j], players[i]];
        }

        db.ref('players').set(players);
        db.ref('gameStatus').set({ 
            started: true, 
            startTime: Date.now(),
            duration: durationSeconds // Išsaugome trukmę DB
        });
    }

    // PAKEISTA: startTimer funkcija, kad naudotų trukmę iš DB
    function startTimer(startTime) {
        clearInterval(timerInterval);
        
        // Gauname trukmę iš DB (jei nėra, naudojam 3600s/60min)
        db.ref('gameStatus/duration').once('value', snap => {
            const duration = snap.val() || 3600;

            timerInterval = setInterval(() => {
                const elapsed = Math.floor((Date.now() - startTime) / 1000);
                const rem = duration - elapsed;

                if (rem <= 0) {
                    clearInterval(timerInterval);
                    document.getElementById('timer').innerText = "00:00";
                    return;
                }
                const m = Math.floor(rem / 60), s = rem % 60;
                document.getElementById('timer').innerText = `${m}:${s < 10 ? '0'+s : s}`;
            }, 1000);
        });
    }

    // PAKEISTA: naujo raundo funkcija taip pat nuskaito laiką
    window.newRound = function() {
        if (!confirm("Ar tikrai norite pradėti NAUJĄ RAUNDĄ?")) return;
        
        const durationMinutes = parseInt(document.getElementById('gameDurationInput').value) || 60;
        const durationSeconds = durationMinutes * 60;

        players.forEach(p => {
            p.id = getUniqueNumber('id');
            p.key = getUniqueNumber('key');
            p.isAlive = true;
            p.kills = 0;
        });
        
        for (let i = players.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [players[i], players[j]] = [players[j], players[i]];
        }

        db.ref('players').set(players);
        db.ref('gameStatus').update({ 
            startTime: Date.now(),
            duration: durationSeconds 
        }); 
    }
    
    // ... (Visa kita jūsų kodo dalis lieka tokia pati) ...
</script>
