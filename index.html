<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Airsoft Control Center</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        :root { --red: #ff4d4d; --blue: #4d94ff; --dark: #121212; --gold: #ffd700; --green: #28a745; }
        body { font-family: sans-serif; background: var(--dark); color: white; padding: 15px; margin: 0; }
        .container { max-width: 600px; margin: auto; }
        .hidden { display: none; }
        
        /* Input & Drop Zone */
        #drop-zone { 
            border: 3px dashed #444; padding: 30px; text-align: center; border-radius: 10px; 
            background: #1a1a1a; cursor: pointer; margin-top: 10px;
        }
        #drop-zone.dragover { border-color: var(--gold); background: #222; }
        
        /* The Instant List */
        .player-card { 
            background: #222; margin: 10px 0; padding: 12px; border-radius: 8px; 
            display: flex; align-items: center; gap: 15px; border-left: 5px solid #444;
        }
        .player-card img { width: 60px; height: 60px; border-radius: 5px; object-fit: cover; }
        .player-info { flex-grow: 1; }
        .codes { font-family: monospace; color: var(--gold); font-weight: bold; margin-top: 4px; }

        .action-btn { background: var(--gold); color: black; padding: 18px; border: none; font-weight: bold; width: 100%; cursor: pointer; margin-top: 15px; border-radius: 8px; }
        .team-btn { padding: 10px; border: none; color: white; opacity: 0.3; cursor: pointer; font-weight: bold; flex: 1; }
        .team-btn.active { opacity: 1; outline: 2px solid white; }
    </style>
</head>
<body>

<div class="container">
    <div id="setup-screen">
        <h2 style="color:var(--gold)">1. ENLIST PLAYERS</h2>
        <input type="text" id="nameInput" placeholder="TYPE NAME HERE..." style="width: 100%; padding: 15px; box-sizing: border-box; background: #222; color: white; border: 1px solid #444; font-size: 1.2rem;">
        
        <div id="drop-zone" id="dz">
            <strong>DRAG PHOTO HERE</strong><br><small>OR CLICK TO SELECT</small>
        </div>
        <input type="file" id="fileInput" class="hidden" accept="image/*">

        <h3 style="margin-top: 25px; border-bottom: 1px solid #333;">CURRENT ROSTER (<span id="pCount">0</span>)</h3>
        <div id="playerList">
            </div>
        
        <button class="action-btn" onclick="showScreen('assign-screen')">NEXT: ASSIGN TEAMS</button>
    </div>

    <div id="assign-screen" class="hidden">
        <h2>2. ASSIGN TEAMS</h2>
        <div id="assignList"></div>
        <button class="action-btn" style="background:var(--green)" onclick="showReview()">FINAL REVIEW</button>
    </div>

    <div id="review-screen" class="hidden">
        <h2>3. FINAL CONFIRMATION</h2>
        <div id="reviewTableArea"></div>
        <button class="action-btn" style="background:var(--green)" onclick="startGlobalGame()">START GAME ON ALL PHONES</button>
    </div>

    <div id="game-screen" class="hidden">
        <div id="timer" style="font-size: 3rem; text-align: center; color: var(--gold);">60:00</div>
        <div id="hunt-ui" style="border: 4px solid var(--gold); padding: 15px; text-align: center;">
            <img id="targetImg" style="width: 100%; height: 300px; object-fit: cover;">
            <h1 id="targetName">---</h1>
            <h2>ID: <span id="targetID" style="color:var(--gold)">--</span></h2>
            <input type="number" id="keyInput" placeholder="KEY" style="font-size: 2rem; width: 100px; text-align: center;">
            <button onclick="checkKey()" class="action-btn" style="background:#a00; color:white;">CONFIRM KILL</button>
        </div>
    </div>
</div>

<script>
    // --- FIREBASE CONFIG (Required for 3-phone sync) ---
    const firebaseConfig = {
  apiKey: "AIzaSyB1aSPG4BKYghWw2KKq_Ri4oqRbDeh4t_8",
  authDomain: "lithilas-bh.firebaseapp.com",
  projectId: "lithilas-bh",
  storageBucket: "lithilas-bh.firebasestorage.app",
  messagingSenderId: "971183564853",
  appId: "1:971183564853:web:2772ee6826ba1fa54d297c",
  measurementId: "G-Y6FSWJD169"
};

    // Initialize Firebase only if keys are provided
    let db = null;
    if (firebaseConfig.apiKey !== "YOUR_KEY") {
        firebase.initializeApp(firebaseConfig);
        db = firebase.database();
    }

    let players = [];
    let userRole = new URLSearchParams(window.location.search).get('role') || 'GM';

    // --- PHOTO HANDLER ---
    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('fileInput');

    ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(e => {
        dropZone.addEventListener(e, ev => { ev.preventDefault(); ev.stopPropagation(); });
    });

    dropZone.onclick = () => fileInput.click();
    dropZone.addEventListener('drop', (e) => handleFile(e.dataTransfer.files[0]));
    fileInput.onchange = (e) => handleFile(e.target.files[0]);

    function handleFile(file) {
        const nameInput = document.getElementById('nameInput');
        if (!nameInput.value) return alert("Enter name first!");
        
        const reader = new FileReader();
        reader.onload = (e) => {
            const newPlayer = {
                name: nameInput.value,
                photo: e.target.result,
                id: Math.floor(Math.random() * 90 + 10),
                key: Math.floor(Math.random() * 90 + 10),
                team: '',
                isAlive: true
            };

            // 1. ADD TO LOCAL LIST INSTANTLY
            players.push(newPlayer);
            renderAll(); 

            // 2. SYNC TO FIREBASE (if set up)
            if (db) db.ref('players').push(newPlayer);

            nameInput.value = ''; // Clear for next player
        };
        reader.readAsDataURL(file);
    }

    // --- RENDER LOGIC ---
    function renderAll() {
        // Update Count
        document.getElementById('pCount').innerText = players.length;

        // Render Main List (Enlist Screen)
        document.getElementById('playerList').innerHTML = players.map(p => `
            <div class="player-card">
                <img src="${p.photo}">
                <div class="player-info">
                    <b>${p.name}</b>
                    <div class="codes">ID: ${p.id} | KEY: ${p.key}</div>
                </div>
            </div>
        `).join('');

        // Render Assignment List
        document.getElementById('assignList').innerHTML = players.map((p, i) => `
            <div class="player-card" style="border-left-color:${p.team==='RAUDONA'?'red':p.team==='MELYNA'?'blue':'#444'}">
                <img src="${p.photo}">
                <b style="flex:1">${p.name}</b>
                <div style="display:flex; gap:5px;">
                    <button class="team-btn ${p.team==='RAUDONA'?'active':''}" style="background:var(--red)" onclick="setTeam(${i},'RAUDONA')">RED</button>
                    <button class="team-btn ${p.team==='MELYNA'?'active':''}" style="background:var(--blue)" onclick="setTeam(${i},'MELYNA')">BLUE</button>
                </div>
            </div>
        `).join('');
    }

    function setTeam(index, team) {
        players[index].team = team;
        renderAll();
        // Update Firebase if online
        if (db) {
            db.ref('players').once('value', snap => {
                snap.forEach(child => {
                    if (child.val().name === players[index].name) child.ref.update({ team: team });
                });
            });
        }
    }

    function showReview() {
        if (players.some(p => !p.team)) return alert("Assign all teams!");
        showScreen('review-screen');
        let html = '<table border="1" style="width:100%; border-collapse:collapse;"><tr><th>NAME</th><th>TEAM</th><th>ID</th><th>KEY</th></tr>';
        players.forEach(p => {
            html += `<tr style="color:${p.team==='RAUDONA'?'var(--red)':'var(--blue)'}"><td>${p.name}</td><td>${p.team}</td><td>${p.id}</td><td>${p.key}</td></tr>`;
        });
        document.getElementById('reviewTableArea').innerHTML = html + '</table>';
    }

    function showScreen(id) {
        document.getElementById('setup-screen').classList.add('hidden');
        document.getElementById('assign-screen').classList.add('hidden');
        document.getElementById('review-screen').classList.add('hidden');
        document.getElementById('game-screen').classList.add('hidden');
        document.getElementById(id).classList.remove('hidden');
    }

    // --- GAME LOGIC ---
    function startGlobalGame() {
        if (db) db.ref('gameStatus').set({ started: true });
        showScreen('game-screen');
        updateTarget();
    }

    function updateTarget() {
        const enemies = players.filter(p => p.team !== userRole && p.isAlive);
        if (enemies.length === 0) {
            document.getElementById('hunt-ui').innerHTML = "<h1>VICTORY</h1>";
            return;
        }
        const t = enemies[0];
        document.getElementById('targetImg').src = t.photo;
        document.getElementById('targetName').innerText = t.name;
        document.getElementById('targetID').innerText = t.id;
    }

    function checkKey() {
        const input = document.getElementById('keyInput').value;
        const enemies = players.filter(p => p.team !== userRole && p.isAlive);
        if (input == enemies[0].key) {
            alert("KILL CONFIRMED");
            enemies[0].isAlive = false;
            if (db) {
                 db.ref('players').once('value', snap => {
                    snap.forEach(c => { if(c.val().name === enemies[0].name) c.ref.update({ isAlive: false }); });
                });
            }
            updateTarget();
        } else { alert("WRONG KEY"); }
    }

    // Firebase Listener for Remote Phones
    if (db) {
        db.ref('gameStatus/started').on('value', snap => {
            if (snap.val()) { showScreen('game-screen'); updateTarget(); }
        });
        db.ref('players').on('value', snap => {
            const data = snap.val();
            if (data) {
                players = Object.values(data);
                renderAll();
                if (document.getElementById('game-screen').className === '') updateTarget();
            }
        });
    }
</script>
</body>
</html>
